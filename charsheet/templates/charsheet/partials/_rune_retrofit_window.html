{{ rune_retrofit_choices|json_script:"rune-retrofit-choices" }}
<section class="payday-window payday-window--large sheet-window sheet-window--editor-modal rune_window" id="runeRetrofitWindow" aria-hidden="true">
  <div class="payday-window__titlebar sheet-window__header" id="runeRetrofitWindowHandle">
    <h3 class="payday-window__title sheet-window__title">Modifizieren</h3>
    <button type="button" class="payday-window__close" id="runeRetrofitWindowClose" aria-label="Modifizieren-Fenster schlie&szlig;en">x</button>
  </div>
  <div class="payday-window__body sheet-window__body">
    <form method="post" action="" id="runeRetrofitForm" class="shop_item_form sheet-window__editor-form" data-sheet-action data-ajax-only data-close-window-on-success="1">
      {% csrf_token %}
      <div class="shop_item_form_layout rune_window_layout">
        <section class="shop_item_form_main shop_item_form_panel shop_panel">
          <div class="shop_item_form_panel_header shop_panel_header">
            <h2>Grunddaten</h2>
          </div>
          <div class="shop_item_form_panel_body">
            <label class="shop_item_form_row">
              <span>Name</span>
              <input type="text" name="name" id="runeRetrofitCustomName" maxlength="200" placeholder="Name des Besitz-Items">
            </label>
            <div class="shop_item_form_grid shop_item_form_grid--equal">
              <label class="shop_item_form_row">
                <span>Preis (KM)</span>
                <input type="number" name="price" id="runeRetrofitPrice" min="0" step="1" value="0">
              </label>
              <label class="shop_item_form_row">
                <span>Gewicht</span>
                <input type="number" name="weight" id="runeRetrofitWeight" min="0" step="0.01" value="0">
              </label>
            </div>
            <label class="shop_item_form_row">
              <span>GK</span>
              <select name="size_class" id="runeRetrofitSizeClass">
                {% for value, label in shop_size_class_choices %}
                  <option value="{{ value }}">{{ label }}</option>
                {% endfor %}
              </select>
            </label>
            <label class="shop_item_form_row">
              <span>Qualit&auml;t</span>
              <select name="quality" id="runeRetrofitQuality">
                {% for quality in shop_quality_choices %}
                  <option value="{{ quality.value }}" style="color: {{ quality.color }};">{{ quality.label }}</option>
                {% endfor %}
              </select>
            </label>
            <div class="shop_item_form_grid shop_item_form_grid--equal">
              <label class="shop_item_form_row">
                <span>Kosten (EP)</span>
                <input type="number" name="experience_cost" min="0" step="1" value="0">
              </label>
              <label class="shop_item_form_row">
                <span>Kosten (KS)</span>
                <input type="number" name="money_cost" min="0" step="1" value="0">
              </label>
            </div>
            <div class="shop_item_form_fieldset">
              <div class="shop_item_form_fieldset_title">Nachr&uuml;st-Runen</div>
              <label class="shop_item_form_row rune_window_search_row">
                <span>Suche</span>
                <input type="search" id="runeRetrofitSearch" class="sheet-window__field rune_window_search_input" placeholder="Rune suchen...">
              </label>
              <div class="rune_dropdown" id="runeRetrofitDropdown">
                <button
                  type="button"
                  class="rune_dropdown_trigger shop_item_multi_select_trigger"
                  id="runeRetrofitDropdownTrigger"
                  aria-haspopup="true"
                  aria-expanded="false"
                >
                  <span class="shop_item_multi_select_value" id="runeRetrofitTriggerLabel">Keine Runen ausgew&auml;hlt</span>
                  <span class="shop_item_multi_select_meta">
                    <span class="rune_dropdown_trigger_count" id="runeRetrofitSelectionCount">0</span>
                    <span class="shop_item_multi_select_chevron" aria-hidden="true">&#9662;</span>
                  </span>
                </button>
                <div class="rune_dropdown_panel" id="runeRetrofitDropdownPanel" hidden>
                  <div id="runeRetrofitOptions" class="shop_item_form_checklist rune_window_options"></div>
                </div>
              </div>
            </div>
            <div class="shop_item_form_conditional" id="runeRetrofitArmorFields" hidden>
              <div class="shop_item_form_fieldset">
                <div class="shop_item_form_fieldset_title">R&uuml;stungswerte</div>
                <label class="shop_item_form_row"><span>RS gesamt</span><input type="number" name="armor_rs_total" min="0" step="1" value="0"></label>
                <div class="shop_item_form_grid">
                  <label class="shop_item_form_row"><span>RS Kopf</span><input type="number" name="armor_rs_head" min="0" step="1" value="0"></label>
                  <label class="shop_item_form_row"><span>RS Torso</span><input type="number" name="armor_rs_torso" min="0" step="1" value="0"></label>
                  <label class="shop_item_form_row"><span>RS Arm links</span><input type="number" name="armor_rs_arm_left" min="0" step="1" value="0"></label>
                  <label class="shop_item_form_row"><span>RS Arm rechts</span><input type="number" name="armor_rs_arm_right" min="0" step="1" value="0"></label>
                  <label class="shop_item_form_row"><span>RS Bein links</span><input type="number" name="armor_rs_leg_left" min="0" step="1" value="0"></label>
                  <label class="shop_item_form_row"><span>RS Bein rechts</span><input type="number" name="armor_rs_leg_right" min="0" step="1" value="0"></label>
                </div>
                <div class="shop_item_form_grid">
                  <label class="shop_item_form_row"><span>Belastung</span><input type="number" name="armor_encumbrance" min="0" step="1" value="0"></label>
                  <label class="shop_item_form_row"><span>Min. St&auml;rke</span><input type="number" name="armor_min_st" min="1" step="1" value="1"></label>
                </div>
              </div>
            </div>
            <div class="shop_item_form_conditional" id="runeRetrofitWeaponFields" hidden>
              <div class="shop_item_form_fieldset">
                <div class="shop_item_form_fieldset_title">Waffenwerte</div>
                <div class="shop_item_form_grid">
                  <label class="shop_item_form_row">
                    <span>Waffentyp</span>
                    <select name="weapon_type">
                      {% for value, label in shop_weapon_type_choices %}
                        <option value="{{ value }}">{{ label }}</option>
                      {% endfor %}
                    </select>
                  </label>
                  <label class="shop_item_form_row"><span>Schaden W&uuml;rfelanzahl</span><input type="number" name="weapon_damage_dice_amount" min="1" step="1" value="1"></label>
                  <label class="shop_item_form_row"><span>Schaden W&uuml;rfelseiten</span><input type="number" name="weapon_damage_dice_faces" min="2" step="1" value="10"></label>
                  <label class="shop_item_form_row">
                    <span>Schaden Operator</span>
                    <select name="weapon_damage_flat_operator">
                      <option value="">Keiner</option>
                      <option value="+">+</option>
                      <option value="-">-</option>
                      <option value="/">/</option>
                    </select>
                  </label>
                  <label class="shop_item_form_row"><span>Schaden Wert</span><input type="number" name="weapon_damage_flat_bonus" step="1" value="0"></label>
                  <label class="shop_item_form_row">
                    <span>Waffengriff</span>
                    <select name="weapon_wield_mode" id="runeRetrofitWeaponWieldMode">
                      <option value="1h">Einh&auml;ndig</option>
                      <option value="2h">Zweih&auml;ndig</option>
                      <option value="vh">Ein- und Zweih&auml;ndig</option>
                    </select>
                  </label>
                  <label class="shop_item_form_row">
                    <span>Schadensquelle</span>
                    <select name="weapon_damage_source">
                      {% for damage_source in shop_damage_source_choices %}
                        <option value="{{ damage_source.id }}">{{ damage_source.name }}</option>
                      {% endfor %}
                    </select>
                  </label>
                </div>
                <div id="runeRetrofitWeaponTwoHandFields" hidden>
                  <div class="shop_item_form_grid">
                    <label class="shop_item_form_row"><span>2H W&uuml;rfelanzahl</span><input type="number" name="weapon_h2_dice_amount" min="1" step="1" value="1"></label>
                    <label class="shop_item_form_row"><span>2H W&uuml;rfelseiten</span><input type="number" name="weapon_h2_dice_faces" min="2" step="1" value="10"></label>
                    <label class="shop_item_form_row">
                      <span>2H Operator</span>
                      <select name="weapon_h2_flat_operator">
                        <option value="">Keiner</option>
                        <option value="+">+</option>
                        <option value="-">-</option>
                        <option value="/">/</option>
                      </select>
                    </label>
                    <label class="shop_item_form_row"><span>2H Wert</span><input type="number" name="weapon_h2_flat_bonus" step="1" value="0"></label>
                  </div>
                </div>
                <div class="shop_item_form_grid">
                  <label class="shop_item_form_row">
                    <span>Schadenstyp</span>
                    <select name="weapon_damage_type">
                      {% for value, label in shop_damage_type_choices %}
                        <option value="{{ value }}">{{ label }}</option>
                      {% endfor %}
                    </select>
                  </label>
                  <label class="shop_item_form_row"><span>Min. St&auml;rke</span><input type="number" name="weapon_min_st" min="1" step="1" value="1"></label>
                </div>
              </div>
            </div>
            <div class="shop_item_form_conditional" id="runeRetrofitShieldFields" hidden>
              <div class="shop_item_form_fieldset">
                <div class="shop_item_form_fieldset_title">Schildwerte</div>
                <div class="shop_item_form_grid">
                  <label class="shop_item_form_row"><span>Schild-RS</span><input type="number" name="shield_rs" min="0" step="1" value="0"></label>
                  <label class="shop_item_form_row"><span>Belastung</span><input type="number" name="shield_encumbrance" min="0" step="1" value="0"></label>
                  <label class="shop_item_form_row"><span>Min. St&auml;rke</span><input type="number" name="shield_min_st" min="1" step="1" value="1"></label>
                </div>
              </div>
            </div>
          </div>
        </section>
        <section class="shop_item_form_details shop_item_form_panel shop_panel">
          <div class="shop_item_form_panel_header shop_panel_header">
            <h2>Magische Effekte</h2>
          </div>
          <div class="shop_item_form_panel_body">
            <label class="shop_item_form_row">
              <span>Beschreibung</span>
              <textarea name="description" id="runeRetrofitDescription" rows="4" maxlength="1000" placeholder="Beschreibung des modifizierten Gegenstands"></textarea>
            </label>
            <p class="shop_item_form_hint">Die Effekte funktionieren wie bei magischen Gegenst&auml;nden und gelten nur f&uuml;r dieses modifizierte Besitz-Item.</p>
            <input type="hidden" name="rune_payloads" id="runeRetrofitRunePayloads" value="[]">
            <input type="hidden" name="magic_modifier_payloads" id="runeRetrofitMagicModifierPayloads" value="[]">
            <div class="shop_magic_effect_list" id="runeRetrofitMagicEffectsList"></div>
            <div class="shop_magic_effect_actions">
              <button type="button" class="shop_item_cancel_btn" id="runeRetrofitAddPlusOneBtn">Waffenmeister-Bonus +1/+1</button>
              <button type="button" class="shop_item_cancel_btn" id="runeRetrofitAddEffectBtn">Effekt hinzuf&uuml;gen</button>
            </div>
          </div>
        </section>
      </div>
      <template id="runeRetrofitMagicEffectTemplate">
        <section class="shop_magic_effect_card" data-magic-effect-row>
          <div class="shop_magic_effect_card_header">
            <h4 class="shop_magic_effect_title">Effekt</h4>
            <button type="button" class="shop_step_btn shop_magic_effect_remove" data-remove-magic-effect aria-label="Effekt entfernen">-</button>
          </div>
          <div class="shop_item_form_grid">
            <label class="shop_item_form_row">
              <span>Was wird beeinflusst?</span>
              <select data-magic-target-kind>
                {% for value, label in item_modifier_target_kind_choices %}
                  <option value="{{ value }}">{{ label }}</option>
                {% endfor %}
              </select>
            </label>
            <label class="shop_item_form_row">
              <span>Bonus oder Malus</span>
              <input type="number" step="1" value="0" data-magic-value-input>
            </label>
          </div>
          <label class="shop_item_form_row">
            <span>Effektbeschreibung</span>
            <input type="text" maxlength="255" placeholder="z. B. Schutz vor Feuer" data-magic-effect-description>
          </label>
          <label class="shop_item_form_row" data-magic-target-row="stat" hidden>
            <span>Welcher Wert?</span>
            <select data-magic-target-select="stat">
              {% for value, label in shop_modifier_stat_choices %}
                <option value="{{ value }}">{{ label }}</option>
              {% endfor %}
            </select>
          </label>
          <label class="shop_item_form_row" data-magic-target-row="attribute" hidden>
            <span>Welches Attribut?</span>
            <select data-magic-target-select="attribute">
              {% for value, label in shop_modifier_attribute_choices %}
                <option value="{{ value }}">{{ label }}</option>
              {% endfor %}
            </select>
          </label>
          <label class="shop_item_form_row" data-magic-target-row="skill" hidden>
            <span>Welche Fertigkeit?</span>
            <select data-magic-target-select="skill">
              {% for skill in shop_modifier_skill_choices %}
                <option value="{{ skill.id }}">{{ skill.name }}</option>
              {% endfor %}
            </select>
          </label>
          <label class="shop_item_form_row" data-magic-target-row="category" hidden>
            <span>Welche Kategorie?</span>
            <select data-magic-target-select="category">
              {% for category in shop_modifier_skill_category_choices %}
                <option value="{{ category.id }}">{{ category.name }}</option>
              {% endfor %}
            </select>
          </label>
        </section>
      </template>
      <div class="shop_item_form_actions">
        <button type="button" id="runeRetrofitCancelBtn" class="shop_item_cancel_btn">Abbrechen</button>
        <button type="submit" class="shop_item_save_btn">Speichern</button>
      </div>
    </form>
  </div>
</section>
