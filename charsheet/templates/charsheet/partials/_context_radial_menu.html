<div
  class="charsheet-radial-menu"
  id="contextRadialMenu"
  aria-hidden="true"
  data-context-radial-menu
>
  <div class="charsheet-radial-menu__backdrop" data-radial-menu-backdrop></div>
  <div class="charsheet-radial-menu__anchor" data-radial-menu-anchor>
    <div class="charsheet-radial-menu__core" aria-hidden="true">
      <span class="charsheet-radial-menu__core_ring"></span>
      <span class="charsheet-radial-menu__core_dot"></span>
    </div>
    <div
      class="charsheet-radial-menu__items"
      data-radial-menu-items
      role="menu"
      aria-label="Schnellzugriff"
    ></div>
    <div
      class="charsheet-radial-menu__resources"
      data-radial-menu-resources
      aria-label="Ressourcen"
    ></div>
  </div>
</div>
