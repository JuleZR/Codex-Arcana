<div class="exp_wrapper" id="sheetExperiencePanel">
  <h2>Erfahrung</h2>
  <div class="exp_rows" aria-label="Erfahrungspunkte">
    <div class="exp_row">
      <span class="exp_label">Gesamt</span>
      <span class="exp_value">{{ character.overall_experience }}</span>
    </div>
    <div class="exp_row">
      <span class="exp_label">Aktuell</span>
      <span class="exp_value">{{ character.current_experience }}</span>
    </div>
  </div>
</div>
