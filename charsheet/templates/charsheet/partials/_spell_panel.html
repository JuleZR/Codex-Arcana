<div class="p2_spells panel_scroll" id="sheetSpellPanel">
  <div class="spell_panel_header">
    <h2>Zauber</h2>
  </div>

  <div class="schools_filter_row spell_filter_row">
    {% if spell_panel_arcane_filter_groups %}
    <div class="spell_school_filter_menu" data-spell-school-filter-menu>
      <button
        type="button"
        class="spell_school_filter_trigger"
        data-spell-school-filter-trigger
        aria-haspopup="true"
        aria-expanded="false"
        title="Zauberschulen filtern"
        aria-label="Zauberschulen filtern"
      >
        <span class="spell_school_filter_trigger_icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" focusable="false">
            <path d="M4 5h16l-6.2 7.1v5.2l-3.6 1.8v-7L4 5Z"></path>
          </svg>
        </span>
      </button>
      <div class="spell_school_filter_popover" data-spell-school-filter-popover hidden>
        <button
          type="button"
          class="spell_school_filter_btn is-active"
          data-spell-school-filter="all"
          aria-pressed="true"
          title="Alle arkanen Schulen"
          aria-label="Alle arkanen Schulen umschalten"
        >
          <span class="spell_school_filter_symbol" aria-hidden="true">&#8734;</span>
          <span class="spell_school_filter_name">Alle</span>
        </button>
        {% for school in spell_panel_arcane_filter_groups %}
          <button
            type="button"
            class="spell_school_filter_btn is-active"
            data-spell-school-filter="{{ school.name }}"
            aria-pressed="true"
            title="{{ school.name }}"
            aria-label="{{ school.name }} umschalten"
          >
            <span class="spell_school_filter_symbol" aria-hidden="true">
              {% if school.symbol_image_url %}
                <img class="spell_school_filter_image" src="{{ school.symbol_image_url }}" alt="" width="23" height="23">
              {% elif school.symbol %}
                {{ school.symbol }}
              {% else %}
                &#9656;
              {% endif %}
            </span>
            <span class="spell_school_filter_name">{{ school.name }}</span>
          </button>
        {% endfor %}
      </div>
    </div>
    {% endif %}
    <input
      type="search"
      id="spellFilterInput"
      class="schools_filter_input spell_filter_input"
      placeholder="Zauber filtern"
      aria-label="Zauber filtern"
    >
  </div>

  <div class="panel_scroll spell_scroll">
    <div class="spell_panel_groups">
      {% for group in spell_panel_groups %}
        <section class="spell_group" data-spell-group>
          <button
            type="button"
            class="spell_group_header school_row_with_tooltip"
            data-spell-group-toggle
            data-spell-group-name="{{ group.name }}"
            data-spell-group-kind="{{ group.kind }}"
            aria-expanded="false"
          >
            <span class="spell_group_heading">
              <span class="spell_group_chevron" aria-hidden="true">&#9656;</span>
              {% if group.symbol_image_url %}
                <span class="spell_group_symbol" aria-hidden="true">
                  <img class="spell_group_symbol_image" src="{{ group.symbol_image_url }}" alt="" width="18" height="18">
                </span>
              {% elif group.symbol %}
                <span class="spell_group_symbol" aria-hidden="true">{{ group.symbol }}</span>
              {% endif %}
              <span class="spell_group_title">{{ group.name }}{% if group.rank_label %} {{ group.rank_label }}{% endif %}</span>
            </span>
            <span class="spell_group_kind">{% if group.kind == 'divine' %}Aspekt{% elif group.kind == 'base' %}Basis{% else %}Schule{% endif %}</span>
          </button>
          <ul class="spell_group_rows" hidden>
            {% for row in group.rows %}
              <li data-spell-search="{{ row.name|lower }} {{ group.name|lower }} {{ row.source_label|lower }} grad {{ row.level }} {{ row.kp_cost }} kp {{ row.cost_display|lower }}">
                <button
                  type="button"
                  class="spell_cast_button tooltip_target"
                  data-tooltip-side="cursor-right"
                  data-tooltip="{{ row.tooltip_text|default:row.description|default:'Keine Beschreibung' }}"
                  data-cast-spell-trigger
                  data-cast-url="{% url 'cast_spell' character.id row.spell_id %}"
                  data-spell-kp-cost="{{ row.kp_cost }}"
                  data-spell-name="{{ row.name }}"
                  aria-label="{{ row.name }} wirken"
                >
                  <span class="spell_cast_name">{{ row.name }}</span>
                  <span class="spell_cast_meta">Grad {{ row.level }}</span>
                  <span class="spell_cast_cost">{{ row.cost_display }}</span>
                  <span class="spell_cast_source{% if row.is_bonus_spell %} spell_cast_source--bonus{% elif row.is_base_spell %} spell_cast_source--base{% endif %}{% if not row.badge_label %} spell_cast_source--hidden{% endif %}">{{ row.badge_label }}</span>
                </button>
              </li>
            {% endfor %}
          </ul>
        </section>
      {% endfor %}
    </div>
  </div>
</div>
