<section class="payday-window payday-window--item-create sheet-window sheet-window--editor-modal item-transfer-dialog" id="itemTransferDialog" data-search-url="{% url 'character_recipient_search' %}" aria-hidden="true">
  <div class="payday-window__titlebar sheet-window__header" id="itemTransferDialogHandle">
    <h3 class="payday-window__title sheet-window__title">Gegenstand versenden</h3>
    <button type="button" class="payday-window__close" id="itemTransferDialogClose" data-close-item-transfer aria-label="Fenster schließen">x</button>
  </div>
  <div class="payday-window__body sheet-window__body"><div class="sheet-window__editor-shell"><div class="sheet-window__editor-pane">
  <form method="post" id="itemTransferForm" class="sheet-window__editor-form item-transfer-form">
    {% csrf_token %}
    <input type="hidden" name="sender_id" id="itemTransferSenderId">
    <input type="hidden" name="recipient_id" id="itemTransferRecipientId">
    <header class="item-transfer-form__heading"><span>Gegenstand versenden</span><strong id="itemTransferName"></strong></header>
    <label class="shop_item_form_row"><span>Empfänger</span><input type="search" id="itemTransferRecipientSearch" autocomplete="off" minlength="2" required placeholder="Charaktername"></label>
    <div class="item-transfer-results" id="itemTransferResults" role="listbox"></div>
    <label class="shop_item_form_row"><span>Menge</span><input type="number" name="quantity" id="itemTransferQuantity" min="1" value="1" required></label>
    <label class="shop_item_form_row"><span>Nachricht</span><textarea name="message" maxlength="1000" rows="4"></textarea></label>
    <fieldset class="item-transfer-permissions" id="itemTransferPermissions" aria-labelledby="itemTransferPermissionsTitle" hidden>
      <h4 class="item-transfer-permissions__title" id="itemTransferPermissionsTitle">Besitz und Rechte</h4>
      <p class="item-transfer-permissions__intro">Du bleibst Eigentümer. Gewährte Rechte kannst du später wieder entziehen.</p>
      <div class="item-transfer-permission-list">
        <label class="item-transfer-permission-row"><input type="checkbox" name="permission_consume_final"><span><strong>Vollständig verbrauchen</strong><small>einschließlich der letzten Einheit</small></span></label>
        <label class="item-transfer-permission-row"><input type="checkbox" name="permission_sell"><span><strong>Verkaufen</strong><small>gegen Geld abgeben</small></span></label>
        <label class="item-transfer-permission-row"><input type="checkbox" name="permission_destroy"><span><strong>Zerstören oder zerlegen</strong><small>endgültig vernichten</small></span></label>
      </div>
      <label class="item-transfer-ownership-card">
        <input type="checkbox" name="transfer_original_ownership" id="itemTransferOriginalOwnership">
        <span><strong>Eigentum übertragen</strong><small>Endgültig: Der Empfänger erhält Rückholrecht und Rechteverwaltung.</small></span>
      </label>
    </fieldset>
    <footer class="shop_item_form_actions item-transfer-form__actions"><button type="submit" class="wax_seal_btn" aria-label="Versenden" title="Versenden"><span class="wax_seal_btn__embossed" aria-hidden="true">&#10003;</span></button></footer>
  </form>
  </div></div></div>
</section>
