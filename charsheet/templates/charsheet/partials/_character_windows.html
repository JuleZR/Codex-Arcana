<section class="payday-window payday-window--item-create sheet-window sheet-window--editor-modal" id="charInfoWindow" aria-hidden="true">
  <div class="payday-window__titlebar sheet-window__header" id="charInfoWindowHandle">
    <h3 class="payday-window__title sheet-window__title">Charakterinfo bearbeiten</h3>
    <button type="button" class="payday-window__close" id="charInfoWindowClose" aria-label="Fenster schließen">x</button>
  </div>
  <div class="payday-window__body sheet-window__body">
    <form method="post" action="{% url 'update_character_info' character.id %}" id="charInfoForm" class="shop_item_form sheet-window__editor-form">
      {% csrf_token %}
      <div class="shop_item_form_grid sheet-window__surface sheet-window__surface--editor sheet-window__surface--form sheet-window__surface--form-grid">
        <label class="shop_item_form_row shop_item_form_row--compact"><span>Name</span>{{ char_info_form.name }}</label>
        <label class="shop_item_form_row shop_item_form_row--compact"><span>Geschlecht</span>{{ char_info_form.gender }}</label>
        <label class="shop_item_form_row shop_item_form_row--compact"><span>Alter</span>{{ char_info_form.age }}</label>
        <label class="shop_item_form_row shop_item_form_row--compact"><span>Gr&ouml;&szlig;e (cm)</span>{{ char_info_form.height }}</label>
        <label class="shop_item_form_row shop_item_form_row--compact"><span>Gewicht (kg)</span>{{ char_info_form.weight }}</label>
        <label class="shop_item_form_row shop_item_form_row--compact"><span>Herkunftsland</span>{{ char_info_form.country_of_origin }}</label>
        <label class="shop_item_form_row shop_item_form_row--compact"><span>Hautfarbe</span>{{ char_info_form.skin_color }}</label>
        <label class="shop_item_form_row shop_item_form_row--compact"><span>Haarfarbe</span>{{ char_info_form.hair_color }}</label>
        <label class="shop_item_form_row shop_item_form_row--compact"><span>Augenfarbe</span>{{ char_info_form.eye_color }}</label>
        <label class="shop_item_form_row shop_item_form_row--compact"><span>Religion</span>{{ char_info_form.religion }}</label>
      </div>
      <label class="shop_item_form_row sheet-window__surface sheet-window__surface--editor sheet-window__surface--form"><span>Aussehen</span>{{ char_info_form.appearance }}</label>
      <div class="shop_item_form_actions">
        <button type="button" id="charInfoCancelBtn" class="shop_item_cancel_btn">Abbrechen</button>
        <button type="submit" class="shop_item_save_btn">Speichern</button>
      </div>
    </form>
  </div>
</section>

<section class="payday-window payday-window--item-create sheet-window sheet-window--editor-modal" id="skillSpecWindow" aria-hidden="true">
  <div class="payday-window__titlebar sheet-window__header" id="skillSpecWindowHandle">
    <h3 class="payday-window__title sheet-window__title" id="skillSpecWindowTitle">Fertigkeit bearbeiten</h3>
    <button type="button" class="payday-window__close" id="skillSpecWindowClose" aria-label="Fenster schließen">x</button>
  </div>
  <div class="payday-window__body sheet-window__body">
    <form method="post" action="" id="skillSpecForm" class="shop_item_form sheet-window__editor-form">
      {% csrf_token %}
      <div class="sheet-window__surface sheet-window__surface--editor sheet-window__surface--form">
        <label class="shop_item_form_row skill_spec_form_row">
          <span>Bezeichnung</span>
          {{ skill_specification_form.specification }}
        </label>
        <p class="skill_spec_hint">Bitte ein einzelnes Wort eintragen, z. B. den konkreten Beruf.</p>

      <div class="shop_item_form_actions">
        <button type="button" id="skillSpecCancelBtn" class="shop_item_cancel_btn">Abbrechen</button>
        <button type="submit" class="shop_item_save_btn">Speichern</button>
      </div>
    </form>
  </div>
</section>
