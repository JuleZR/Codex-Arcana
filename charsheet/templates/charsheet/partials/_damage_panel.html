<div class="p2_panel p2_damage" id="sheetDamagePanel">
  <h2>Schaden</h2>
  <div class="damage_display">
    <div class="damage_circle_wrap" aria-label="Aktueller Schaden und Wundstufen-Malus">
      <span class="damage_circle">
        <span class="damage_current_value">{{ character.current_damage }}</span>
      </span>
      <span class="damage_max_circle">{{ current_damage_max }}</span>
      <span class="wound_penalty_circle{% if is_wound_penalty_ignored %} is-disabled{% endif %}">{{ current_wound_penalty }}</span>
    </div>
    <p class="wound_stage_text">{{ current_wound_stage }}</p>
  </div>
  <form method="post" action="{% url 'adjust_current_damage' character.id %}" class="damage_actions" data-sheet-action>
    {% csrf_token %}
    <input type="hidden" name="action" class="damage_action_input" value="" />
    <input type="hidden" name="amount" class="damage_amount_input" value="1" />
    <div class="damage_actions_table" role="group" aria-label="Schadensanpassung">
      <span class="damage_actions_head">Heal</span>
      <span class="damage_actions_head">Damage</span>
      <button type="button" data-action="heal" data-amount="1" class="damage_action_btn">-1</button>
      <button type="button" data-action="damage" data-amount="1" class="damage_action_btn">+1</button>
      <button type="button" data-action="heal" data-amount="5" class="damage_action_btn">-5</button>
      <button type="button" data-action="damage" data-amount="5" class="damage_action_btn">+5</button>
      <button type="button" data-action="heal" data-amount="10" class="damage_action_btn">-10</button>
      <button type="button" data-action="damage" data-amount="10" class="damage_action_btn">+10</button>
    </div>
  </form>
</div>
