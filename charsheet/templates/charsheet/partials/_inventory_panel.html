<div class="p2_panel p2_fill" id="sheetInventoryPanel">
  <div class="p2_panel_header">
    <h2>Ausr&uuml;stung</h2>
    <button
      type="button"
      class="inventory_total_weight inventory_total_weight--toggle"
      aria-label="Traglast aus mitgef&uuml;hrtem Gewicht ein- oder ausschalten"
      aria-pressed="false"
      data-carry-load-toggle
      data-carry-enabled="{% if carry_load.enabled %}1{% else %}0{% endif %}"
      data-carry-update-url="{% url 'update_carry_load_state' character.id %}"
      data-carry-weight="{{ carry_load.weight }}"
    >
      <span class="inventory_total_weight__penalty" data-carry-load-penalty hidden></span>
      <span class="inventory_total_weight__separator" data-carry-load-separator hidden>&middot;</span>
      <span class="inventory_total_weight__value">{{ inventory_total_weight_display }} kg</span>
    </button>
  </div>
  <div class="panel_scroll inventory_scroll">
    <ul class="p2_lines inventory_list inventory_list--dropzone" data-inventory-zone="carried">
      {% include "charsheet/partials/_inventory_row_list.html" with rows=inventory_rows %}
    </ul>
    <section class="inventory_storage{% if not stored_inventory_rows %} inventory_storage--empty{% endif %}"
              data-inventory-storage
              data-inventory-zone="stored"
              {% if not stored_inventory_rows %}hidden{% endif %}>
      <div class="inventory_storage_header">
        <h3>Karren / Lager / Pferd</h3>
      </div>
      <ul class="p2_lines inventory_list inventory_list--storage">
        {% include "charsheet/partials/_inventory_row_list.html" with rows=stored_inventory_rows %}
      </ul>
    </section>
  </div>
</div>
